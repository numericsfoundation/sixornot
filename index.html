
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numerics 1 to 6 Dot Animation</title>
<style>
  body{
    margin:0;
    background:#ffffff;
    font-family:"Century Gothic", Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .slide{
    width:1800px;
    height:1000px;
    max-width:96vw;
    max-height:78vh;
    aspect-ratio: 9 / 5;
    position:relative;
    overflow:hidden;
    border:1px solid #d9d9d9;
    background:#ffffff;
  }
  .dot{
    position:absolute;
    border-radius:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 10px 18px rgba(0,0,0,0.16);
    transition:
      left 1.45s ease-in-out,
      top 1.45s ease-in-out,
      width 1.1s ease-in-out,
      height 1.1s ease-in-out,
      background-color 1.1s ease-in-out,
      opacity 0.35s ease-in-out;
    opacity:1;
  }
  .controls{
    margin-top:18px;
    display:flex;
    gap:14px;
  }
  button{
    font-family:"Century Gothic", Arial, sans-serif;
    font-size:28px;
    padding:16px 34px;
    background:#ffffff;
    border:1px solid #999;
    cursor:pointer;
  }
  button:hover{
    background:#f4f4f4;
  }
</style>
</head>
<body>
  <div class="slide" id="slide"></div>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
  </div>

<script>
const slide = document.getElementById("slide");
const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const resetBtn = document.getElementById("resetBtn");

const MAX_DOTS = 6;
const dotEls = [];
for(let i=0;i<MAX_DOTS;i++){
  const d = document.createElement("div");
  d.className = "dot";
  slide.appendChild(d);
  dotEls.push(d);
}

let running = false;
let timer = null;
let stepIndex = 0;

const quantities = [1,2,3,4,5,6];
const backgrounds = [
  "#ffffff",
  "#f2f2f2",
  "#e8f0fe",
  "#fff3cd",
  "#e6ffe6",
  "#fce4ec",
  "#e0f7fa",
  "#f4ecff"
];
const palette = [
  "#000000",
  "#2E75B6",
  "#C00000",
  "#6AA84F",
  "#7F60A8",
  "#E69138",
  "#3C78D8",
  "#CC4125",
  "#8E7CC3",
  "#93C47D"
];
const dotSizes = [46, 64, 82, 100, 118, 136];

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function setRandomBackground(){
  slide.style.background = backgrounds[Math.floor(Math.random() * backgrounds.length)];
}

function padDots(points){
  const padded = points.map(p => ({...p, visible:true}));
  while(padded.length < MAX_DOTS){
    padded.push({
      x: slide.clientWidth / 2,
      y: slide.clientHeight / 2,
      size: 0,
      color: "#000000",
      visible: false
    });
  }
  return padded;
}

function centerPoints(points, slideWidth, slideHeight){
  const visible = points.filter(p => p.visible !== false);
  if(visible.length === 0) return points;
  const xs = visible.map(p => p.x);
  const ys = visible.map(p => p.y);
  const minX = Math.min(...xs);
  const maxX = Math.max(...xs);
  const minY = Math.min(...ys);
  const maxY = Math.max(...ys);
  const currentCenterX = (minX + maxX) / 2;
  const currentCenterY = (minY + maxY) / 2;
  const targetCenterX = slideWidth / 2;
  const targetCenterY = slideHeight / 2;
  const dx = targetCenterX - currentCenterX;
  const dy = targetCenterY - currentCenterY;
  return points.map(p => ({
    ...p,
    x: p.visible === false ? p.x : p.x + dx,
    y: p.visible === false ? p.y : p.y + dy
  }));
}

function enforceNoOverlap(points, slideWidth, slideHeight){
  const adjusted = points.map(p => ({...p}));
  for(let pass=0; pass<16; pass++){
    let moved = false;
    for(let i=0;i<adjusted.length;i++){
      if(adjusted[i].visible === false) continue;
      for(let j=i+1;j<adjusted.length;j++){
        if(adjusted[j].visible === false) continue;
        const a = adjusted[i];
        const b = adjusted[j];
        const ra = a.size / 2;
        const rb = b.size / 2;
        const needed = ra + rb + 12;
        let dx = b.x - a.x;
        let dy = b.y - a.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < needed){
          moved = true;
          if(dist === 0){
            dx = 1;
            dy = 0;
            dist = 1;
          }
          const push = (needed - dist) / 2;
          const ux = dx / dist;
          const uy = dy / dist;
          a.x -= ux * push;
          a.y -= uy * push;
          b.x += ux * push;
          b.y += uy * push;

          const ma = Math.max(30, ra);
          const mb = Math.max(30, rb);
          a.x = Math.min(slideWidth - ma, Math.max(ma, a.x));
          a.y = Math.min(slideHeight - ma, Math.max(ma, a.y));
          b.x = Math.min(slideWidth - mb, Math.max(mb, b.x));
          b.y = Math.min(slideHeight - mb, Math.max(mb, b.y));
        }
      }
    }
    if(!moved) break;
  }
  return adjusted;
}

function randomStart(count, slideWidth, slideHeight){
  const points = [];
  let attempts = 0;
  while(points.length < count && attempts < 8000){
    attempts++;
    const size = dotSizes[Math.floor(Math.random() * dotSizes.length)];
    const radius = size / 2;
    const x = 140 + radius + Math.random() * Math.max(1, slideWidth - 280 - radius * 2);
    const y = 140 + radius + Math.random() * Math.max(1, slideHeight - 280 - radius * 2);
    const color = palette[Math.floor(Math.random() * palette.length)];
    let ok = true;
    for(const p of points){
      const dx = p.x - x;
      const dy = p.y - y;
      const minDist = (p.size / 2) + radius + 16;
      if(Math.sqrt(dx*dx + dy*dy) < minDist){
        ok = false;
        break;
      }
    }
    if(ok){
      points.push({x, y, size, color});
    }
  }
  return padDots(points);
}

function lineArrangement(count, slideWidth, slideHeight){
  const size = dotSizes[Math.floor(Math.random() * dotSizes.length)];
  const spacing = size * 0.75;
  const totalWidth = count * size + (count - 1) * spacing;
  let x = (slideWidth - totalWidth) / 2 + size / 2;
  const y = slideHeight / 2;
  const colors = shuffle(palette).slice(0, count);
  const points = [];
  for(let i=0;i<count;i++){
    points.push({x, y, size, color: colors[i]});
    x += size + spacing;
  }
  return padDots(points);
}

function twoRowsArrangement(count, slideWidth, slideHeight){
  const size = dotSizes[Math.floor(Math.random() * dotSizes.length)];
  const colsTop = Math.ceil(count / 2);
  const colsBottom = count - colsTop;
  const gapX = size * 0.95;
  const gapY = size * 0.95;
  const colors = shuffle(palette).slice(0, count);
  const points = [];
  const widthTop = colsTop * size + Math.max(0, colsTop - 1) * gapX;
  const widthBottom = Math.max(0, colsBottom * size + Math.max(0, colsBottom - 1) * gapX);
  const startXTop = slideWidth / 2 - widthTop / 2 + size / 2;
  const startXBottom = slideWidth / 2 - widthBottom / 2 + size / 2;
  const topY = slideHeight / 2 - (size + gapY) / 2;
  const bottomY = slideHeight / 2 + (size + gapY) / 2;

  let idx = 0;
  for(let i=0;i<colsTop;i++){
    points.push({x:startXTop + i*(size+gapX), y:topY, size, color:colors[idx++]});
  }
  for(let i=0;i<colsBottom;i++){
    points.push({x:startXBottom + i*(size+gapX), y:bottomY, size, color:colors[idx++]});
  }
  return padDots(points);
}

function triangleArrangement(count, slideWidth, slideHeight){
  const size = dotSizes[Math.floor(Math.random() * dotSizes.length)];
  const gapX = size * 0.9;
  const gapY = size * 0.85;
  const colors = shuffle(palette).slice(0, count);
  const rows = [];
  let remaining = count;
  let rowSize = 1;
  while(remaining > 0){
    const take = Math.min(rowSize, remaining);
    rows.push(take);
    remaining -= take;
    rowSize++;
  }
  const points = [];
  let idx = 0;
  const totalHeight = rows.length * size + (rows.length - 1) * gapY;
  const startY = slideHeight / 2 - totalHeight / 2 + size / 2;

  rows.forEach((len, r) => {
    const rowWidth = len * size + (len - 1) * gapX;
    const startX = slideWidth / 2 - rowWidth / 2 + size / 2;
    for(let c=0;c<len;c++){
      points.push({
        x: startX + c*(size+gapX),
        y: startY + r*(size+gapY),
        size,
        color: colors[idx++]
      });
    }
  });
  return padDots(points);
}

function circleArrangement(count, slideWidth, slideHeight){
  const size = dotSizes[Math.floor(Math.random() * dotSizes.length)];
  const colors = shuffle(palette).slice(0, count);
  const radius = Math.max(120, size * 1.7);
  const points = [];
  const startAngle = -Math.PI / 2;
  for(let i=0;i<count;i++){
    const angle = startAngle + (Math.PI * 2 * i / count);
    points.push({
      x: slideWidth / 2 + radius * Math.cos(angle),
      y: slideHeight / 2 + radius * Math.sin(angle),
      size,
      color: colors[i]
    });
  }
  return padDots(points);
}

function buildSequence(){
  const slideWidth = slide.clientWidth;
  const slideHeight = slide.clientHeight;
  const sequence = [];
  const arrangementFactories = [
    lineArrangement,
    twoRowsArrangement,
    triangleArrangement,
    circleArrangement
  ];

  for(let round=0; round<4; round++){
    const quantityOrder = shuffle(quantities);
    quantityOrder.forEach(q => {
      sequence.push(randomStart(q, slideWidth, slideHeight));
      const arrangement = shuffle(arrangementFactories)[0];
      let points = arrangement(q, slideWidth, slideHeight);
      points = centerPoints(points, slideWidth, slideHeight);
      points = enforceNoOverlap(points, slideWidth, slideHeight);
      sequence.push(points);
    });
  }
  return sequence;
}

let sequence = buildSequence();

function apply(points){
  points.forEach((p, i) => {
    const el = dotEls[i];
    el.style.left = p.x + "px";
    el.style.top = p.y + "px";
    el.style.width = p.size + "px";
    el.style.height = p.size + "px";
    el.style.backgroundColor = p.color;
    el.style.opacity = p.visible === false ? "0" : "1";
  });
}

function nextFrame(){
  if(!running) return;
  setRandomBackground();
  apply(sequence[stepIndex]);
  stepIndex = (stepIndex + 1) % sequence.length;
  timer = setTimeout(nextFrame, 2500);
}

function start(){
  if(running) return;
  running = true;
  nextFrame();
}

function pause(){
  running = false;
  clearTimeout(timer);
}

function resetAnimation(){
  pause();
  stepIndex = 0;
  sequence = buildSequence();
  setRandomBackground();
  apply(sequence[0]);
}

startBtn.addEventListener("click", start);
pauseBtn.addEventListener("click", pause);
resetBtn.addEventListener("click", resetAnimation);

resetAnimation();
</script>
</body>
</html>
